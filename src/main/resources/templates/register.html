<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - BEOBOOKS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="container auth-container">
        <div class="col-md-6 col-lg-5">
            <div class="card card-auth">
                <div class="card-body p-4 p-md-5">
                    <h3 class="fw-bold text-center mb-4" style="color: var(--secondary-color);">Đăng Ký</h3>

                    <form>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Họ và tên</label>
                            <input type="text" class="form-control" placeholder="Ví dụ: Nguyễn Văn A">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Email</label>
                            <input type="email" class="form-control" placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Mật khẩu</label>
                            <input type="password" class="form-control" placeholder="Tối thiểu 6 ký tự">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Nhập lại mật khẩu</label>
                            <input type="password" class="form-control" placeholder="Xác nhận mật khẩu">
                        </div>
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="agreeTerms">
                            <label class="form-check-label small text-muted" for="agreeTerms">
                                Tôi đồng ý với <a href="#" class="text-success text-decoration-none">Điều khoản sử
                                    dụng</a>
                            </label>
                        </div>
                        <button type="button" class="btn-auth mb-3">ĐĂNG KÝ TÀI KHOẢN</button>

                        <div class="text-center">
                            <span class="small text-muted">Đã có tài khoản?</span>
                            <a href="/login/form" class="small fw-bold text-success text-decoration-none ms-1">Đăng nhập
                                ngay</a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="text-center mt-4">
                <a href="/home" class="text-muted text-decoration-none small"><i
                        class="fa-solid fa-arrow-left me-1"></i> Quay lại trang chủ</a>
            </div>
        </div>
    </div>

    <footer class="bg-white py-4 border-top text-center mt-auto">
        <h5 class="fw-bold text-success">BEOBOOKS</h5>
        <p class="text-muted small">© 2026 Dự án Tốt nghiệp.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
