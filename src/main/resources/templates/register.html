<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - BEOBOOKS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center"> <!-- QUAN TRỌNG -->
        <div class="col-md-6 col-lg-5">

            <div class="card shadow">
                <div class="card-body p-4">

                    <h3 class="text-center text-success mb-4">
                        Đăng Ký
                    </h3>

                    <form th:action="@{/register}" method="post" th:object="${user}">

                        <!-- Họ tên -->
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Họ và tên</label>
                            <input type="text"
                                   th:field="*{fullname}"
                                   class="form-control"
                                   placeholder="Ví dụ: Nguyễn Văn A">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('fullname')}"
                                 th:errors="*{fullname}">
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Email</label>
                            <input type="email"
                                   th:field="*{email}"
                                   class="form-control"
                                   placeholder="name@example.com">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}">
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Mật khẩu</label>
                            <input type="password"
                                   th:field="*{password}"
                                   class="form-control"
                                   placeholder="Tối thiểu 6 ký tự">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}">
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Nhập lại mật khẩu</label>
                            <input type="password"
                                   name="confirmPassword"
                                   class="form-control"
                                   placeholder="Xác nhận mật khẩu">

                            <!-- LỖI CONFIRM PASSWORD -->
                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('password')}"
                                 th:text="${#fields.errors('password')[0]}">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            ĐĂNG KÝ TÀI KHOẢN
                        </button>

                        <div class="text-center mt-3">
                            <span class="small text-muted">Đã có tài khoản?</span>
                            <a th:href="@{/login/form}"
                               class="small fw-bold text-success text-decoration-none ms-1">
                                Đăng nhập ngay
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
