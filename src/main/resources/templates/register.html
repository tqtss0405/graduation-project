<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - BEOBOOKS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="container auth-container">
        <div class="col-md-6 col-lg-5">
            <div class="card card-auth">
                <div class="card-body p-4 p-md-5">
                    <h3 class="fw-bold text-center mb-4" style="color: var(--secondary-color);">Đăng Ký</h3>

                    <div th:if="${errorMessage}" class="alert alert-danger rounded-3 text-center mb-4">
                        <i class="fa-solid fa-triangle-exclamation me-1"></i>
                        <span th:text="${errorMessage}"></span>
                    </div>

                    <form th:action="@{/register}" th:object="${registerDTO}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-muted">Họ và tên</label>
                            <input type="text" th:field="*{fullname}" class="form-control"
                                placeholder="Ví dụ: Nguyễn Văn Khách" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-muted">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="Email của bạn" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-muted">Số điện thoại</label>
                            <input type="tel" th:field="*{phone}" class="form-control"
                                placeholder="Nhập số điện thoại" required pattern="^(0|\+84)[0-9]{9}$" title="Số điện thoại phải gồm 10 chữ số, bắt đầu bằng 0 hoặc +84">
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-sm-6">
                                <label class="form-label fw-bold small text-muted">Mật khẩu</label>
                                <div class="input-group">
                                    <input type="password" th:field="*{password}" class="form-control border-end-0"
                                        placeholder="Tạo mật khẩu" required minlength="6" id="regPassword">
                                    <span class="input-group-text bg-white border-start-0" style="cursor: pointer;" onclick="togglePassword('regPassword', this)">
                                        <i class="fa-regular fa-eye text-muted"></i>
                                    </span>
                                </div>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label fw-bold small text-muted">Xác nhận</label>
                                <div class="input-group">
                                    <input type="password" th:field="*{confirmPassword}" class="form-control border-end-0"
                                        placeholder="Nhập lại" required minlength="6" id="regConfirm">
                                    <span class="input-group-text bg-white border-start-0" style="cursor: pointer;" onclick="togglePassword('regConfirm', this)">
                                        <i class="fa-regular fa-eye text-muted"></i>
                                    </span>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-register btn-success w-100 text-white mb-3">Tạo tài
                            khoản</button>

                        <div class="text-center mt-3">
                            <span class="text-muted small">Đã có tài khoản?</span>
                            <a href="/login/form" class="text-success fw-bold text-decoration-none small">Đăng nhập
                                ngay</a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="text-center mt-4">
                <a href="/home" class="text-muted text-decoration-none small"><i
                        class="fa-solid fa-arrow-left me-1"></i> Quay lại trang chủ</a>
            </div>
        </div>
    </div>

    <footer class="bg-white py-4 border-top text-center mt-auto">
        <h5 class="fw-bold text-success">BEOBOOKS</h5>
        <p class="text-muted small">© 2026 Dự án Tốt nghiệp.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword(inputId, iconSpan) {
            const input = document.getElementById(inputId);
            const icon = iconSpan.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
