<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - BEOBOOKS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <div class="container auth-container">
        <div class="col-md-6 col-lg-5">
            <div class="card card-auth">
                <div class="card-body p-4 p-md-5">
                    <h3 class="fw-bold text-center mb-4" style="color: var(--secondary-color)">
                        Đăng Nhập
                    </h3>
                    <div th:if="${message}" class="alert text-center fw-bold" th:classappend="${alertClass}"
                        role="alert">
                        <i class="fa-solid fa-circle-info me-2"></i>
                        <span th:text="${message}"></span>
                    </div>
                    <form method="post" action="/login">
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Email</label>
                            <input type="text" class="form-control" name="username" placeholder="Nhập email của bạn" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Mật khẩu</label>
                            <input type="password" class="form-control" name="password" placeholder="Nhập mật khẩu" />
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe" />
                                <label class="form-check-label small text-muted" for="rememberMe">Ghi nhớ đăng nhập</label>
                            </div>
                            <a href="/forgot-password" class="small text-decoration-none text-success fw-bold">Quên mật
                                khẩu?</a>
                        </div>
                        <button type="submit" class="btn-auth mb-3">
                            ĐĂNG NHẬP
                        </button>

                        <div class="text-center mb-3">
                            <span class="small text-muted">Chưa có tài khoản?</span>
                            <a href="/register" class="small fw-bold text-success text-decoration-none ms-1">Đăng ký
                                ngay</a>
                        </div>

                        <div class="divider">Hoặc đăng nhập bằng</div>

                        <div class="row g-2">
                            <div class="col-12">
                                <a href="/oauth2/authorization/google" class="social-btn btn-google">
                                    <i class="fa-brands fa-google text-danger"></i>
                                    Google
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="text-center mt-4">
                <a href="/home" class="text-muted text-decoration-none small"><i
                        class="fa-solid fa-arrow-left me-1"></i> Quay lại
                    trang chủ</a>
            </div>
        </div>
    </div>

    <footer class="bg-white py-4 border-top text-center mt-auto">
        <h5 class="fw-bold text-success">BEOBOOKS</h5>
        <p class="text-muted small">© 2026 Dự án Tốt nghiệp.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
