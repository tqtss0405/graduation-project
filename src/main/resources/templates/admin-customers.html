<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quản lý Khách hàng - Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/admin-style.css">

</head>


<body>

    <!-- SIDEBAR -->

    <nav class="sidebar">

        <div class="sidebar-brand">
            BEO<span style="color:white">BOOKS</span>
        </div>

        <ul class="nav flex-column mt-3">

            <li class="nav-item">
                <a href="/admin/dashboard" class="nav-link">
                    <i class="fa-solid fa-gauge"></i> Tổng quan
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/products" class="nav-link">
                    <i class="fa-solid fa-book"></i> Quản lý sách
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/orders" class="nav-link">
                    <i class="fa-solid fa-cart-shopping"></i> Đơn hàng
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/customers" class="nav-link active">
                    <i class="fa-solid fa-users"></i> Khách hàng
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/categories" class="nav-link">
                    <i class="fa-solid fa-layer-group"></i> Danh mục
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/vouchers" class="nav-link">
                    <i class="fa-solid fa-ticket"></i> Mã giảm giá
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/reviews" class="nav-link">
                    <i class="fa-solid fa-star"></i> Đánh giá
                </a>
            </li>

            <li class="nav-item mt-5">
                <a href="/logout" class="nav-link text-danger">
                    <i class="fa-solid fa-right-from-bracket"></i> Thoát
                </a>
            </li>

        </ul>

    </nav>


    <!-- MAIN -->

    <main class="main-content">

        <div class="admin-header">

            <div>
                <h4 class="fw-bold m-0">Quản lý Khách Hàng</h4>
                <small class="text-muted">Quản lý toàn bộ khách hàng trong hệ thống</small>
            </div>

        </div>


        <!-- SEARCH -->

        <div class="bg-white p-3 rounded-3 shadow-sm mb-4">

            <form action="/admin/customers" method="get">

                <div class="input-group" style="max-width:400px">

                    <input name="keyword" type="text" class="form-control border-end-0"
                        placeholder="Tìm kiếm (Email, SĐT)...">

                    <button class="btn btn-outline-secondary border-start-0 bg-white">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>

                </div>

            </form>

        </div>



        <!-- TABLE -->

        <div class="bg-white rounded-3 shadow-sm overflow-hidden">

            <table class="table table-hover mb-0 align-middle">

                <thead class="table-light">

                    <tr>

                        <th>Khách hàng</th>

                        <th>Email</th>

                        <th>Trạng thái</th>

                        <th>Số đơn</th>

                        <th>Hành động</th>

                    </tr>

                </thead>



                <tbody>

                    <tr th:each="customer : ${customers}">

                        <td>

                            <div class="d-flex align-items-center gap-2">

                                <img th:src="${customer.image != null ? customer.image : 'https://ui-avatars.com/api/?name=' + customer.fullname}"
                                    class="rounded-circle" width="36">

                                <span class="fw-bold" th:text="${customer.fullname}">
                                    Tên khách hàng
                                </span>

                            </div>

                        </td>



                        <td class="text-muted" th:text="${customer.email}">
                            email@gmail.com
                        </td>



                        <td>

                            <span th:if="${customer.active}" class="badge bg-success">
                                Hoạt động
                            </span>

                            <span th:unless="${customer.active}" class="badge bg-danger">
                                Bị chặn
                            </span>

                        </td>



                        <td th:text="${#lists.size(customer.orders)}">
                            0
                        </td>



                        <td>

                            <form th:action="@{/admin/customers/toggle-status/{id}(id=${customer.id})}" method="post"
                                style="display:inline">

                                <button type="submit"
                                    th:class="${customer.active} ? 'btn btn-sm btn-danger' : 'btn btn-sm btn-success'">

                                    <i class="fa-solid" th:classappend="${customer.active} ? 'fa-ban' : 'fa-check'"></i>

                                    <span th:text="${customer.active} ? ' Chặn' : ' Mở chặn'"></span>

                                </button>

                            </form>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </main>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/sidebar.js"></script>

</body>

</html>
