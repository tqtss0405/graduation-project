<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đổi Mật Khẩu - BEOBOOKS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="/css/style.css" />

    <style>
        /* CSS RIÊNG CHO TRANG ĐỔI MẬT KHẨU */
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f8f9fa;
        }

        .card-custom {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .card-header-custom {
            background: linear-gradient(135deg, #198754, #20c997);
            color: white;
            padding: 30px 20px;
            border-bottom: none;
        }

        /* Tùy chỉnh Input Group để đẹp hơn */
        .input-group-text {
            background-color: #f1f3f5;
            border: 1px solid #ced4da;
            border-right: none;
            color: #6c757d;
        }

        /* Icon mắt bên phải */
        .input-group-text.toggle-eye {
            border-right: 1px solid #ced4da;
            border-left: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        .input-group-text.toggle-eye:hover {
            color: #198754;
        }

        .form-control {
            border-left: none;
            border-right: none;
            background-color: #fff;
            padding: 12px;
            font-size: 0.95rem;
        }

        /* Hiệu ứng khi bấm vào ô nhập liệu (Focus) - Đổi viền xanh lá */
        .form-control:focus {
            box-shadow: none;
            border-color: #198754;
        }
        
        .form-control:focus ~ .input-group-text.toggle-eye,
        .input-group:focus-within .input-group-text {
            border-color: #198754;
            color: #198754;
        }

        /* Nút bấm */
        .btn-update {
            background-color: #198754;
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-update:hover {
            background-color: #146c43;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(25, 135, 84, 0.3);
        }

        .btn-back {
            border: 2px solid #e9ecef;
            color: #6c757d;
            background: white;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background-color: #e9ecef;
            color: #495057;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/home">BEO<span class="text-success">BOOKS</span></a>
            <div class="ms-auto">
                <a href="/home" class="text-decoration-none text-muted"><i class="fa-solid fa-house"></i> Trang chủ</a>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div class="card card-custom">
                    <div class="card-header card-header-custom text-center">
                        <div class="mb-2">
                            <i class="fa-solid fa-shield-halved fs-1"></i>
                        </div>
                        <h4 class="fw-bold mb-0">Đổi Mật Khẩu</h4>
                        <p class="small opacity-75 mb-0">Bảo vệ tài khoản của bạn</p>
                    </div>

                    <div class="card-body p-4 p-md-5">
                        
                        <div th:if="${message}" 
                             th:class="${message.contains('thành công') ? 'alert alert-success' : 'alert alert-danger'} + ' rounded-3 text-center mb-4'" 
                             th:text="${message}">
                        </div>

                       <form action="/user/change-password" method="post">
                            
                            <!-- Mật khẩu hiện tại -->
                            <div class="mb-4">
                                <label class="form-label small fw-bold text-muted ps-2">Mật khẩu hiện tại</label>
                                <div class="input-group">
                                    <span class="input-group-text rounded-start-pill ps-3">
                                        <i class="fa-solid fa-lock"></i>
                                    </span>
                                    <input type="password" name="currentPass" id="currentPass"
                                           class="form-control" 
                                           placeholder="Nhập mật khẩu hiện tại" required>
                                    <span class="input-group-text toggle-eye rounded-end-pill pe-3"
                                          onclick="togglePassword('currentPass', this)">
                                        <i class="fa-solid fa-eye"></i>
                                    </span>
                                </div>
                            </div>

                            <!-- Mật khẩu mới (có icon mắt) -->
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted ps-2">Mật khẩu mới</label>
                                <div class="input-group">
                                    <span class="input-group-text rounded-start-pill ps-3">
                                        <i class="fa-solid fa-key"></i>
                                    </span>
                                    <input type="password" name="newPass" id="newPass"
                                           class="form-control" 
                                           placeholder="Nhập mật khẩu mới" required>
                                    <span class="input-group-text toggle-eye rounded-end-pill pe-3"
                                          onclick="togglePassword('newPass', this)">
                                        <i class="fa-solid fa-eye"></i>
                                    </span>
                                </div>
                            </div>

                            <!-- Nhập lại mật khẩu mới (có icon mắt) -->
                            <div class="mb-5">
                                <label class="form-label small fw-bold text-muted ps-2">Nhập lại mật khẩu mới</label>
                                <div class="input-group">
                                    <span class="input-group-text rounded-start-pill ps-3">
                                        <i class="fa-solid fa-check-double"></i>
                                    </span>
                                    <input type="password" name="confirmPass" id="confirmPass"
                                           class="form-control" 
                                           placeholder="Xác nhận lại" required>
                                    <span class="input-group-text toggle-eye rounded-end-pill pe-3"
                                          onclick="togglePassword('confirmPass', this)">
                                        <i class="fa-solid fa-eye"></i>
                                    </span>
                                </div>
                            </div>

                            <div class="d-grid gap-3">
                                <button type="submit" class="btn btn-update rounded-pill text-white shadow-sm">
                                    Xác Nhận Thay Đổi
                                </button>
                                <a href="/user/profile" class="btn btn-back rounded-pill fw-bold py-2 text-center text-decoration-none">
                                    Quay lại hồ sơ
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-white border-top pt-4 mt-5 text-center">
        <p class="text-muted small">© 2026 BEOBOOKS. Security Check.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function togglePassword(inputId, iconSpan) {
            const input = document.getElementById(inputId);
            const icon = iconSpan.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>

</html>
