<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khôi Phục Mật Khẩu - BEOBOOKS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f8f9fa; }
        .card-custom { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); padding: 2rem; }
        .input-group-text { background-color: #f1f3f5; border: 1px solid #ced4da; border-right: none; color: #6c757d; }
        .form-control { border-left: none; padding: 12px; font-size: 0.95rem; }
        .form-control:focus { box-shadow: none; border-color: #198754; }
        .form-control:focus+.input-group-text { border-color: #198754; color: #198754; }
        .btn-update { background-color: #198754; border: none; padding: 12px; font-weight: 600; transition: all 0.3s; }
        .btn-update:hover { background-color: #146c43; transform: translateY(-2px); }
        .btn-otp { border-top-right-radius: 50rem !important; border-bottom-right-radius: 50rem !important; font-weight: 600; width: 140px; }
    </style>
</head>

<body>
    <main class="container my-5">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-5">
                <div class="card card-custom bg-white">
                    <div class="text-center mb-4">
                        <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 rounded-circle mb-3" style="width: 60px; height: 60px;">
                            <i class="fa-solid fa-lock text-success fs-3"></i>
                        </div>
                        <h4 class="fw-bold" th:text="${step == 2 ? 'Tạo Mật Khẩu Mới' : 'Khôi Phục Mật Khẩu'}">Khôi Phục Mật Khẩu</h4>
                    </div>

                    <div th:if="${error}" class="alert alert-danger text-center small py-2 rounded-3" th:text="${error}"></div>
                    <div th:if="${message}" class="alert alert-success text-center small py-2 rounded-3" th:text="${message}"></div>

                    <form th:if="${step == 1 || step == null}" action="/forgot-password/verify-otp" method="post">
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted ps-1">Địa chỉ Email</label>
                            <div class="input-group">
                                <span class="input-group-text rounded-start-pill ps-3"><i class="fa-solid fa-envelope"></i></span>
                                <input type="email" id="email" name="email" class="form-control rounded-end-pill" placeholder="ví dụ: abc@gmail.com" th:value="${emailInput}" required>
                            </div>
                            <small id="otpMessage" class="form-text d-none mt-1 fw-bold ps-2"></small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted ps-1">Mã OTP (Hiệu lực 1 phút)</label>
                            <div class="input-group">
                                <span class="input-group-text rounded-start-pill ps-3"><i class="fa-solid fa-shield-halved"></i></span>
                                <input type="text" name="otp" class="form-control" placeholder="Nhập 6 số" maxlength="6" required>
                                <button type="button" class="btn btn-outline-success btn-otp" id="btnGetOtp" onclick="sendOtpAjax()">Lấy mã OTP</button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-update w-100 rounded-pill text-white shadow-sm mb-3">XÁC NHẬN MÃ OTP</button>
                    </form>

                    <form th:if="${step == 2}" action="/forgot-password/reset" method="post">
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted ps-1">Mật khẩu mới</label>
                            <div class="input-group">
                                <span class="input-group-text rounded-start-pill ps-3"><i class="fa-solid fa-key"></i></span>
                                <input type="password" name="newPassword" class="form-control rounded-end-pill" placeholder="Mật khẩu mới" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted ps-1">Xác nhận mật khẩu</label>
                            <div class="input-group">
                                <span class="input-group-text rounded-start-pill ps-3"><i class="fa-solid fa-check-double"></i></span>
                                <input type="password" name="confirmPassword" class="form-control rounded-end-pill" placeholder="Nhập lại mật khẩu" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-update w-100 rounded-pill text-white shadow-sm mb-3">LƯU MẬT KHẨU MỚI</button>
                    </form>

                    <div th:if="${step == 3}" class="text-center mt-2">
                        <a href="/login/form" class="btn btn-update w-100 rounded-pill text-white shadow-sm">ĐĂNG NHẬP NGAY</a>
                    </div>

                    <div th:if="${step == 1 || step == null}" class="text-center mt-2">
                        <span class="small text-muted">Nhớ ra mật khẩu rồi? <a href="/login/form" class="text-success text-decoration-none fw-bold">Đăng nhập</a></span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script th:if="${step == 1 || step == null}">
        function sendOtpAjax() {
            const email = document.getElementById('email').value;
            const btn = document.getElementById('btnGetOtp');
            const msg = document.getElementById('otpMessage');

            if (!email) {
                msg.innerText = "Vui lòng nhập email trước!";
                msg.className = "form-text mt-1 fw-bold ps-2 text-danger d-block";
                document.getElementById('email').focus();
                return;
            }

            btn.disabled = true;
            btn.innerText = "Đang gửi...";

            fetch('/forgot-password/send-otp-ajax', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(email)
            })
            .then(res => res.text())
            .then(data => {
                if (data === 'success') {
                    msg.innerText = "Mã OTP đã được gửi vào Email!";
                    msg.className = "form-text mt-1 fw-bold ps-2 text-success d-block";
                    startCountdown(60); 
                } else if (data === 'not_found') {
                    msg.innerText = "Email chưa được đăng ký trong hệ thống!";
                    msg.className = "form-text mt-1 fw-bold ps-2 text-danger d-block";
                    btn.disabled = false;
                    btn.innerText = "Lấy mã OTP";
                } else {
                    msg.innerText = "Lỗi gửi mail, vui lòng thử lại!";
                    msg.className = "form-text mt-1 fw-bold ps-2 text-danger d-block";
                    btn.disabled = false;
                    btn.innerText = "Lấy mã OTP";
                }
            }).catch(err => {
                btn.disabled = false;
                btn.innerText = "Lấy mã OTP";
            });
        }

        function startCountdown(seconds) {
            const btn = document.getElementById('btnGetOtp');
            let time = seconds;
            
            const timer = setInterval(() => {
                btn.innerText = "Gửi lại (" + time + "s)";
                time--;

                if (time < 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = "Lấy mã OTP";
                }
            }, 1000);
        }
    </script>
</body>
</html>
